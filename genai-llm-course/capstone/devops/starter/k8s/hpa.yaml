# Horizontal Pod Autoscaler for Acme HR Knowledge Assistant
# TODO: Tune minReplicas, maxReplicas, and targets for your workload
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: acme-hr-assistant-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: acme-hr-assistant
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
