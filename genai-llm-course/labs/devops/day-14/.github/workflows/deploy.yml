# GitHub Actions CI/CD Pipeline — Acme HR Knowledge Assistant
# Illustrative workflow showing a 4-stage gate for LLM services:
#   lint-and-test → build-and-scan → eval-gate → deploy-canary
#
# Replace placeholder values (image registry, eval script path, deploy commands)
# with your real infrastructure details before using in production.

name: LLM Service CI/CD

on: [push]

env:
  # ---- Overrideable via repository secrets / vars ----
  IMAGE_NAME: acme-hr-assistant
  IMAGE_REGISTRY: ${{ secrets.IMAGE_REGISTRY }}        # e.g. ghcr.io/acme
  EVAL_PASS_THRESHOLD: "0.7"
  CANARY_WEIGHT: "10"                                   # percent of traffic

jobs:

  # ---------------------------------------------------------------------------
  # Stage 1 — Lint & Test
  # Fast feedback: style check + unit/integration tests.
  # Runs on every push; all subsequent stages depend on this passing.
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (exit-zero so they don't block the pipeline)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        env:
          # No real API key needed — service runs in mock mode
          ANTHROPIC_API_KEY: ""

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Stage 2 — Build & Scan
  # Build the Docker image and scan for known CVEs with Trivy.
  # Fails on HIGH/CRITICAL vulnerabilities (configurable).
  # ---------------------------------------------------------------------------
  build-and-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    needs: lint-and-test   # only runs if lint-and-test passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.IMAGE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false          # push only after scan passes
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true           # load into local daemon for scanning

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"          # fail pipeline on HIGH/CRITICAL findings
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Push image (scan passed)
        run: |
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Export image tag for downstream jobs
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

  # ---------------------------------------------------------------------------
  # Stage 3 — Eval Gate
  # Run automated quality evaluation of the LLM service responses.
  # Computes a score (0–1); pipeline fails if score < EVAL_PASS_THRESHOLD.
  # This is the LLM-specific quality gate — critical for production safety.
  # ---------------------------------------------------------------------------
  eval-gate:
    name: Eval Gate
    runs-on: ubuntu-latest
    needs: build-and-scan   # only runs if image is built and scanned clean

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install eval dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull image for eval
        run: |
          docker pull ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Start service container for eval
        run: |
          docker run -d \
            --name eval-service \
            -p 8000:8000 \
            -e ANTHROPIC_API_KEY="" \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Wait for the service to be ready
          sleep 5
          docker ps

      - name: Run LLM quality eval script
        id: eval
        run: |
          # eval_suite.py scores responses on: relevance, groundedness, safety
          # Exits non-zero if average score < EVAL_PASS_THRESHOLD
          python evals/eval_suite.py \
            --endpoint http://localhost:8000 \
            --threshold ${{ env.EVAL_PASS_THRESHOLD }} \
            --output eval_results.json
        env:
          EVAL_PASS_THRESHOLD: ${{ env.EVAL_PASS_THRESHOLD }}

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval_results.json

      - name: Stop eval container
        if: always()
        run: docker rm -f eval-service || true

  # ---------------------------------------------------------------------------
  # Stage 4 — Canary Deploy
  # Deploy to 10% of traffic. Run smoke tests. Promote on pass, rollback on fail.
  # Adapt the deploy commands below for your platform (k8s, ECS, Cloud Run, etc.)
  # ---------------------------------------------------------------------------
  deploy-canary:
    name: Deploy Canary
    runs-on: ubuntu-latest
    needs: eval-gate        # only runs if quality gate passes
    environment: production  # requires manual approval in GitHub environments (optional)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure cloud credentials
        # Replace this step with your cloud provider's credential action:
        #   AWS:   aws-actions/configure-aws-credentials
        #   GCP:   google-github-actions/auth
        #   Azure: azure/login
        run: echo "Configure your cloud credentials here"
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Deploy canary (10% traffic)
        id: canary_deploy
        run: |
          echo "Deploying canary with ${{ env.CANARY_WEIGHT }}% traffic weight..."
          # Replace with your platform's deploy command, e.g.:
          #   kubectl set image deployment/acme-hr-canary app=$IMAGE:$SHA
          #   aws ecs update-service --cluster prod --service acme-hr-canary ...
          bash deploy.sh deploy_canary
        env:
          IMAGE_TAG: ${{ github.sha }}
          APP_NAME: ${{ env.IMAGE_NAME }}
          CANARY_WEIGHT: ${{ env.CANARY_WEIGHT }}

      - name: Wait for canary to stabilize
        run: |
          echo "Waiting 60s for canary to receive traffic and stabilize..."
          sleep 60

      - name: Run smoke tests against canary
        id: smoke
        run: |
          bash deploy.sh run_smoke_test
        env:
          IMAGE_TAG: ${{ github.sha }}
          APP_NAME: ${{ env.IMAGE_NAME }}

      - name: Promote canary to full rollout
        if: success()
        run: |
          echo "Smoke tests passed — promoting canary to 100% traffic"
          bash deploy.sh promote_to_full
        env:
          IMAGE_TAG: ${{ github.sha }}
          APP_NAME: ${{ env.IMAGE_NAME }}

      - name: Rollback canary on failure
        if: failure()
        run: |
          echo "Smoke tests FAILED — rolling back canary"
          bash deploy.sh rollback
        env:
          IMAGE_TAG: ${{ github.sha }}
          APP_NAME: ${{ env.IMAGE_NAME }}
