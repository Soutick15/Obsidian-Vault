# Service — stable ClusterIP and DNS name for the HR Assistant pods.
#
# selector must match the pod template labels in deployment.yaml exactly.
# A mismatch creates a silent failure: the Service exists but has empty
# endpoints, so all traffic is dropped with no error at apply time.
#
# To verify endpoints after deployment:
#   kubectl get endpoints hr-assistant-svc
#
# Kubernetes docs: https://kubernetes.io/docs/concepts/services-networking/service/
apiVersion: v1
kind: Service
metadata:
  name: hr-assistant-svc
  namespace: default
  labels:
    app: hr-assistant
spec:
  # --- Selector ---------------------------------------------------------
  # Must match spec.template.metadata.labels in the Deployment.
  selector:
    app: hr-assistant

  # --- Ports ------------------------------------------------------------
  # port:       the port clients connect to on the Service ClusterIP
  # targetPort: the port the container listens on (containerPort in Deployment)
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000

  # --- Type -------------------------------------------------------------
  # ClusterIP: accessible only within the cluster.
  # Use with an Ingress controller (nginx, Traefik) for external access.
  # Switch to LoadBalancer for direct cloud LB provisioning.
  type: ClusterIP
